<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Styles moved to css/style.css */
    </style>
</head>
<body>
    <div class="main-wrapper">
        <header>
            <h1>Appointment Booking</h1>
        </header>
        <main>
            <section id="booking-system">
                <h2>Book Your Appointment</h2>
            <div id="time-slots-container">
                <h3>Available Time Slots</h3>
                <ul>
                    <!-- Time slots will be populated by JavaScript -->
                </ul>
            </div>
            <form id="booking-form">
                <div>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="time-slot-select">Choose a time slot:</label>
                    <select id="time-slot-select" name="time-slot-select">
                        <!-- Options will be populated by JavaScript -->
                    </select>
                </div>
                <button type="submit">Book Now</button>
            </form>
            <div id="message-container" aria-live="polite"></div>
            </section>
        </main>
        <footer>
            <p>&copy; 2024 Appointment Booking</p>
        </footer>
    </div> <!-- Close main-wrapper -->
    <!-- Basic JavaScript for view switching might be added later -->
    <!-- <script src="app.js"></script> -->
    <script src="js/script.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Booking Management</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .booking-panel, .admin-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .panel-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .panel-header i {
            font-size: 1.5rem;
            margin-right: 12px;
            color: #667eea;
        }

        .panel-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .date-picker {
            position: relative;
        }

        .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .time-slot {
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-weight: 500;
        }

        .time-slot:hover {
            border-color: #667eea;
            background-color: #f8f9ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .time-slot.selected {
            background-color: #667eea;
            color: white;
            border-color: #667eea;
        }

        .time-slot.booked {
            background-color: #f8f9fa;
            color: #6c757d;
            border-color: #dee2e6;
            cursor: not-allowed;
            text-decoration: line-through;
        }

        .time-slot.booked:hover {
            transform: none;
            box-shadow: none;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
        }

        .btn-success {
            background-color: #28a745;
            color: white;
        }

        .alert {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }

        .alert-success {
            background-color: #d1e7dd;
            color: #0f5132;
            border-left-color: #28a745;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #842029;
            border-left-color: #dc3545;
        }

        .booking-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .booking-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .booking-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .booking-info {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .booking-details h4 {
            color: #333;
            margin-bottom: 4px;
        }

        .booking-details p {
            color: #666;
            font-size: 0.9rem;
            margin: 2px 0;
        }

        .booking-actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .booking-panel, .admin-panel {
                padding: 20px;
            }

            .time-slots {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            }

            .filters {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-shield-alt"></i> Admin Panel</h1>
            <p>Manage all bookings and system settings.</p>
        </div>

    <div id="adminLoginSection" class="container" style="max-width: 500px; margin-top: 50px;">
        <div class="booking-panel" style="padding: 40px;"> <!-- Reusing booking-panel style for the card look -->
            <div class="panel-header" style="margin-bottom: 30px; justify-content: center;">
                <i class="fas fa-lock" style="font-size: 2rem; margin-right: 15px;"></i>
                <h2 style="font-size: 1.8rem;">Admin Login</h2>
            </div>
            <div id="login-alert" style="margin-bottom: 20px;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-key"></i> Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
        </div>
    </div>

        <div id="adminContentSection" class="main-content" style="display: none;">
            <!-- Admin Panel -->
            <div class="admin-panel">
                <div class="panel-header">
                    <i class="fas fa-cog"></i>
                    <h2>Booking Management</h2>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <div id="total-bookings" class="stat-number">0</div>
                        <div class="stat-label">Total Bookings</div>
                    </div>
                    <div class="stat-card">
                        <div id="today-bookings" class="stat-number">0</div>
                        <div class="stat-label">Today</div>
                    </div>
                    <div class="stat-card">
                        <div id="upcoming-bookings" class="stat-number">0</div>
                        <div class="stat-label">Upcoming</div>
                    </div>
                </div>

                <div class="filters">
                    <div class="filter-group">
                        <label for="filter-date">Filter by Date</label>
                        <input type="date" id="filter-date" class="form-control">
                    </div>
                    <div class="filter-group">
                        <label for="filter-search">Search</label>
                        <input type="text" id="filter-search" class="form-control" placeholder="Name or email...">
                    </div>
                </div>

                <div style="margin-bottom: 15px;">
                    <button id="refresh-bookings" class="btn btn-secondary btn-sm">
                        <i class="fas fa-sync"></i> Refresh
                    </button>
                    <button id="clear-all" class="btn btn-danger btn-sm" style="float: right;">
                        <i class="fas fa-trash"></i> Clear All
                    </button>
                </div>

                <div id="booking-list" class="booking-list">
                    <!-- Bookings will be populated dynamically -->
                </div>
            </div>
        </div>
    </div>

    <script>
    // --- Login Logic START ---
    const loginForm = document.getElementById('login-form');
    const adminLoginSection = document.getElementById('adminLoginSection');
    const adminContentSection = document.getElementById('adminContentSection');
    const loginAlert = document.getElementById('login-alert');

    // Hardcoded credentials
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "admin";

    function showLoginError(message) {
        loginAlert.innerHTML = `<div class="alert alert-error">${message}</div>`;
    }

    function clearLoginError() {
        loginAlert.innerHTML = '';
    }

    function attemptLogin() {
        clearLoginError();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
            // Successful login
            adminLoginSection.style.display = 'none';
            adminContentSection.style.display = ''; // Show admin content

            // Successful login
            adminLoginSection.style.display = 'none';
            adminContentSection.style.display = ''; // Show admin content

            // Initialize the admin system (BookingSystem) AFTER login and panel is visible
            if (typeof window.bookingSystemInstance !== 'undefined' && window.bookingSystemInstance.init) {
                 window.bookingSystemInstance.init();
            } else if (typeof BookingSystem !== 'undefined' && !window.bookingSystemInstance) {
                // If not yet instantiated, instantiate and init
                window.bookingSystemInstance = new BookingSystem(); // Ensure it's globally accessible if needed later
                // bookingSystemInstance.init(); // The constructor already calls init()
            } else if (window.bookingSystemInstance && window.bookingSystemInstance.init) {
                // If already instantiated but needs re-init or refresh
                window.bookingSystemInstance.init();
            }
            console.log("Login successful, admin panel shown and BookingSystem initialized.");
        } else {
            showLoginError('Invalid username or password.');
            console.log("Login failed.");
        }
    }

    if (loginForm) {
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();
            attemptLogin();
        });
    } else {
        console.error("Login form not found. Make sure admin.html is correct.");
        // If the login form itself isn't found, there's a fundamental issue with the HTML structure.
        // However, adminContentSection should still be hidden by default if this script runs.
        if (adminContentSection) {
             adminContentSection.style.display = 'none';
        }
    }
    // --- Login Logic END ---
        class BookingSystem {
            constructor() {
                this.bookings = this.loadBookings();
                this.selectedTimeSlot = null;
                this.init();
            }

            init() {
                this.setupEventListeners();
                // this.setupDatePicker(); // Removed for admin panel
                this.renderBookings();
                this.updateStats();
            }

            setupEventListeners() {
                // Form submission - REMOVED (user specific)
                // document.getElementById('booking-form').addEventListener('submit', (e) => {
                //     e.preventDefault();
                //     this.handleBookingSubmission();
                // });

                // Date change - REMOVED (user specific, admin might have different date pickers)
                // document.getElementById('appointment-date').addEventListener('change', () => {
                //     this.generateTimeSlots();
                // });

                // Filter events
                document.getElementById('filter-date').addEventListener('change', () => this.renderBookings());
                document.getElementById('filter-search').addEventListener('input', () => this.renderBookings());

                // Admin actions
                document.getElementById('refresh-bookings').addEventListener('click', () => {
                    this.renderBookings();
                    this.updateStats();
                });

                document.getElementById('clear-all').addEventListener('click', () => {
                    if (confirm('Are you sure you want to delete all bookings?')) {
                        this.bookings = [];
                        this.saveBookings();
                        this.renderBookings();
                        this.updateStats();
                        // this.generateTimeSlots(); // Removed for admin panel
                    }
                });
            }

            // setupDatePicker() - REMOVED (admin panel does not use it directly)
            // generateTimeSlots() - REMOVED (admin panel does not use it directly)
            // selectTimeSlot(element) - REMOVED (related to generateTimeSlots)

            formatTime12Hour(time24) {
                const [hours, minutes] = time24.split(':');
                const hour = parseInt(hours);
                const ampm = hour >= 12 ? 'PM' : 'AM';
                const displayHour = hour % 12 || 12;
                return `${displayHour}:${minutes} ${ampm}`;
            }

            isTimeSlotBooked(date, time) {
                return this.bookings.some(booking =>
                    booking.date === date && booking.time === time
                );
            }

            isTimeSlotInPast(date, time) {
                const now = new Date();
                const slotDateTime = new Date(`${date}T${time}`);
                return slotDateTime < now;
            }

            // selectTimeSlot(element) - REMOVED

            // handleBookingSubmission() - REMOVED (user specific)
            // isValidEmail(email) - REMOVED (user specific)

            showAlert(message, type) {
                // Consider making this more generic or admin-specific if #booking-alert is not present
                // For now, assuming an element with id="booking-alert" or similar might be used in admin panel too.
                // If not, this needs adjustment or removal.
                const alertContainer = document.getElementById('login-alert') || document.getElementById('booking-alert'); // Try login alert first
                if (!alertContainer) {
                    console.warn("No alert container found for showAlert in admin panel.");
                    return;
                }
                alertContainer.innerHTML = `
                    <div class="alert alert-${type === 'error' ? 'error' : 'success'}">
                        <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>
                        ${message}
                    </div>
                `;

                setTimeout(() => {
                    alertContainer.innerHTML = '';
                }, 5000);
            }

            renderBookings() {
                const container = document.getElementById('booking-list');
                const filterDate = document.getElementById('filter-date').value;
                const filterSearch = document.getElementById('filter-search').value.toLowerCase();

                let filteredBookings = this.bookings;

                if (filterDate) {
                    filteredBookings = filteredBookings.filter(booking => booking.date === filterDate);
                }

                if (filterSearch) {
                    filteredBookings = filteredBookings.filter(booking =>
                        booking.name.toLowerCase().includes(filterSearch) ||
                        booking.email.toLowerCase().includes(filterSearch)
                    );
                }

                // Sort by date and time
                filteredBookings.sort((a, b) => {
                    const dateTimeA = new Date(`${a.date}T${a.time}`);
                    const dateTimeB = new Date(`${b.date}T${b.time}`);
                    return dateTimeB - dateTimeA;
                });

                if (filteredBookings.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">No bookings found.</p>';
                    return;
                }

                container.innerHTML = filteredBookings.map(booking => `
                    <div class="booking-item">
                        <div class="booking-info">
                            <div class="booking-details">
                                <h4><i class="fas fa-user"></i> ${booking.name}</h4>
                                <p><i class="fas fa-envelope"></i> ${booking.email}</p>
                                <p><i class="fas fa-phone"></i> ${booking.phone}</p>
                                <p><i class="fas fa-calendar"></i> ${this.formatDate(booking.date)} at ${this.formatTime12Hour(booking.time)}</p>
                                ${booking.notes ? `<p><i class="fas fa-sticky-note"></i> ${booking.notes}</p>` : ''}
                            </div>
                            <div class="booking-actions">
                                <button class="btn btn-danger btn-sm" onclick="bookingSystem.deleteBooking(${booking.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            deleteBooking(id) {
                if (confirm('Are you sure you want to delete this booking?')) {
                    this.bookings = this.bookings.filter(booking => booking.id !== id);
                    this.saveBookings();
                    this.renderBookings();
                    this.updateStats();
                    // this.generateTimeSlots(); // Removed
                }
            }

            updateStats() {
                const total = this.bookings.length;
                const today = new Date().toISOString().split('T')[0];
                const todayCount = this.bookings.filter(booking => booking.date === today).length;
                const upcomingCount = this.bookings.filter(booking => {
                    const bookingDate = new Date(booking.date);
                    const now = new Date();
                    now.setHours(0, 0, 0, 0);
                    return bookingDate >= now;
                }).length;

                document.getElementById('total-bookings').textContent = total;
                document.getElementById('today-bookings').textContent = todayCount;
                document.getElementById('upcoming-bookings').textContent = upcomingCount;
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }

            loadBookings() {
                try {
                    const stored = localStorage.getItem('professional-bookings');
                    return stored ? JSON.parse(stored) : [];
                } catch (e) {
                    console.error('Error loading bookings:', e);
                    return [];
                }
            }

            saveBookings() {
                try {
                    localStorage.setItem('professional-bookings', JSON.stringify(this.bookings));
                } catch (e) {
                    console.error('Error saving bookings:', e);
                }
            }
        }

        // Initialize the booking system - REMOVED, now handled by login logic
        // const bookingSystem = new BookingSystem();
    </script>
</body>
</html>
